# Settings
- defaults:
    link:
        create: true
        relink: true
        force: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.zshrc: zsh/zshrc.zsh
    ~/.config/nvim: nvim
    "~/Library/Application Support/Code/User/settings.json": vscode/settings.json
    ~/.gitconfig: git/gitconfig
    ~/.gitignore_global: git/gitignore_global
